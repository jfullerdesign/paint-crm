<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrushPro CRM — Painting Company</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --grn:#1A5C38;--grn2:#22783F;--grn-light:#E8F5EE;--grn-mid:#C6E8D4;
  --bg:#F3F4F6;--surface:#FFFFFF;
  --border:#E5E7EB;--text:#111827;
  --muted:#6B7280;--light:#9CA3AF;
  --red:#EF4444;--yellow:#F59E0B;--blue:#3B82F6;--purple:#7C3AED;
  --r:16px;--rs:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  --shadowlg:0 12px 40px rgba(0,0,0,.14);
  --font:'Plus Jakarta Sans',sans-serif;
  --sw:220px;--hh:68px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--surface);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;border-right:1px solid var(--border)}
.s-logo{padding:22px 18px 16px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--grn);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.logo-sub{font-size:10px;color:var(--light);font-weight:500;text-transform:uppercase;letter-spacing:.7px;margin-top:1px}
.s-nav{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-sect{font-size:10px;font-weight:700;color:var(--light);letter-spacing:1px;text-transform:uppercase;padding:14px 8px 5px;margin-top:2px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rs);color:var(--muted);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.nav-btn:hover{background:var(--grn-light);color:var(--grn)}
.nav-btn.active{background:var(--grn);color:#fff;font-weight:600}
.nav-btn .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.s-foot{padding:16px 14px;border-top:1px solid var(--border)}
.s-foot-card{background:var(--grn);border-radius:12px;padding:14px;color:#fff}
.s-foot-t{font-size:13px;font-weight:700;margin-bottom:3px}
.s-foot-s{font-size:11px;opacity:.7;margin-bottom:10px}
.s-foot-btn{display:block;width:100%;padding:7px;background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:background .15s}
.s-foot-btn:hover{background:rgba(255,255,255,.3)}

/* MAIN */
#main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;gap:16px}
.tb-search{flex:1;max-width:320px;display:flex;align-items:center;border:none;border-radius:10px;background:var(--bg);padding:0 12px;transition:border .15s}
.tb-search:focus-within{border-color:var(--grn);background:#fff}
.tb-search-ico{font-size:14px;color:var(--light);flex-shrink:0;margin-right:10px;line-height:1}
.tb-search input{flex:1;padding:9px 0;border:none;outline:none;font-size:13.5px;font-family:var(--font);background:transparent;color:var(--text)}
.tb-search input:focus{border-color:var(--grn);background:#fff}
.tb-title{font-size:20px;font-weight:800;color:var(--text);flex:1}
.tb-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-icon-btn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .15s}
.tb-icon-btn:hover{border-color:var(--grn);color:var(--grn)}
.tb-avatar{width:36px;height:36px;border-radius:50%;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}
#content{padding:24px 26px;flex:1}

/* PAGE HEADER */
.page-hd{margin-bottom:22px}
.page-hd h1{font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px}
.page-hd p{font-size:13.5px;color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--font);line-height:1}
.btn-primary{background:var(--grn);color:#fff}.btn-primary:hover{background:var(--grn2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,92,56,.3)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--bg);border-color:var(--grn)}
.btn-ghost{background:none;color:var(--muted);border:none}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA}.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:7px 13px;font-size:12.5px}.btn-xs{padding:5px 9px;font-size:12px}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.ct{font-size:14.5px;font-weight:700}
.cb{padding:20px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px}
.stat-card{background:var(--surface);border-radius:var(--r);padding:22px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.stat-card.dark{background:var(--grn);border-color:var(--grn)}
/* Donezo-style diagonal hatch decoration on dark card */
.stat-card.dark::after{content:'';position:absolute;right:-18px;bottom:-24px;width:130px;height:130px;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.09) 0px,rgba(255,255,255,.09) 2px,transparent 2px,transparent 14px);border-radius:50%;pointer-events:none}
.stat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.stat-label{font-size:13px;font-weight:600;color:var(--muted)}
.stat-card.dark .stat-label{color:rgba(255,255,255,.78)}
.stat-arrow{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0;background:var(--surface)}
.stat-card.dark .stat-arrow{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.9);background:rgba(255,255,255,.1)}
.stat-arrow:hover{border-color:var(--grn);color:var(--grn);background:var(--grn-light)}
.stat-card.dark .stat-arrow:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.2)}
.stat-val{font-size:38px;font-weight:800;line-height:1;margin-bottom:10px;letter-spacing:-1.5px;color:var(--text)}
.stat-card.dark .stat-val{color:#fff}
.stat-sub{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;background:rgba(255,255,255,.18);color:#fff;padding:3px 9px;border-radius:100px}
.stat-sub.light{background:var(--grn-light);color:var(--grn)}
/* Donezo hatch strip on white cards */
.stat-card:not(.dark) .stat-hatch{position:absolute;bottom:0;right:0;width:70px;height:60px;background-image:repeating-linear-gradient(135deg,rgba(26,92,56,.04) 0px,rgba(26,92,56,.04) 2px,transparent 2px,transparent 12px);pointer-events:none;border-radius:0 0 var(--r) 0}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-new_lead{background:#EFF6FF;color:#2563EB}
.badge-contacted{background:#F5F3FF;color:#7C3AED}
.badge-active_estimate{background:#FFF7ED;color:#C2410C}
.badge-estimate_sent{background:#FFFBEB;color:#B45309}
.badge-job_won{background:#ECFDF5;color:#047857}
.badge-job_in_progress{background:#EFF6FF;color:#1D4ED8}
.badge-job_complete{background:#F0FDF4;color:#15803D}
.badge-job_lost{background:#FEF2F2;color:#DC2626}
.badge-inactive{background:#F9FAFB;color:#6B7280}
.badge-wo_new{background:#EFF6FF;color:#2563EB}
.badge-wo_upcoming{background:#F5F3FF;color:#7C3AED}
.badge-wo_in_progress{background:#FFF7ED;color:#C2410C}
.badge-wo_quality_control{background:#FFFBEB;color:#B45309}
.badge-wo_completed{background:#ECFDF5;color:#047857}
.badge-wo_closed{background:#F0FDF4;color:#15803D}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:11px 18px;font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.6px;background:#FAFAFA;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:14px 18px;font-size:13.5px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#F9FFF9}
.tn{font-weight:600}.ts{font-size:12px;color:var(--muted);margin-top:2px}

/* FILTERS BAR */
.fbar{display:flex;align-items:center;gap:10px;padding:1px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:#FAFAFA}
.si-wrap{display:flex;align-items:center;flex:1;min-width:180px;border:none;border-radius:var(--rs);background:#fff;transition:border .15s;padding:0 11px;margin:0}
.si-wrap:focus-within{border-color:var(--grn)}
.si-wrap .sic{font-size:14px;color:var(--muted);flex-shrink:0;margin-right:10px;line-height:1}
.search-input{flex:1;padding:8px 0;border:none;outline:none;font-size:13.5px;font-family:var(--font);background:transparent;color:var(--text)}
.fsel{padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13.5px;font-family:var(--font);outline:none;cursor:pointer;background:#fff;color:var(--text);transition:border .15s}
.fsel:focus{border-color:var(--grn)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fdi .15s ease}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadowlg);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;animation:slu .2s ease}
.modal-lg{max-width:780px}
@keyframes fdi{from{opacity:0}to{opacity:1}}
@keyframes slu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:17px;font-weight:800}
.mc{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.mc:hover{background:var(--bg);border-color:var(--grn);color:var(--grn)}
.mb{padding:22px 24px;overflow-y:auto;flex:1}
.mf{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0;background:#FAFAFA;border-radius:0 0 20px 20px}

/* FORMS */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg2 .fw{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:12.5px;font-weight:600;color:var(--text)}
.lopt{font-weight:400;color:var(--muted)}
input[type=text],input[type=email],input[type=tel],input[type=number],input[type=date],select,textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13.5px;font-family:var(--font);color:var(--text);outline:none;transition:all .15s;background:var(--surface);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--grn);box-shadow:0 0 0 3px rgba(26,92,56,.08)}
textarea{resize:vertical;min-height:76px}

/* DETAIL LAYOUT */
.dl{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
.prof-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.prof-hd{background:var(--grn);padding:26px 22px;text-align:center;position:relative;overflow:hidden;background-size:cover;background-position:center}
.prof-hd::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(10,50,25,.72),rgba(10,50,25,.72));z-index:0}
.prof-av{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 10px;border:2px solid rgba(255,255,255,.35);position:relative;z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.prof-nm{font-size:17px;font-weight:800;color:#fff;margin-bottom:7px;position:relative;z-index:1;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.prof-info{padding:16px 18px}
.ir{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.ir:last-child{border-bottom:none}
.ii{font-size:13px;color:var(--grn);width:16px;flex-shrink:0;margin-top:1px}
.il{font-size:10.5px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.iv{font-weight:500}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px}
.tab{padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--grn);border-bottom-color:var(--grn)}

/* FILE ZONE */
.fzone{border:2px dashed var(--border);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.fzone:hover,.fzone.dragover{border-color:var(--grn);background:var(--grn-light)}
.fzone-ico{font-size:28px;margin-bottom:7px}
.fzone-txt{font-size:13.5px;color:var(--muted)}
.fzone-sub{font-size:12px;color:var(--light);margin-top:3px}
.flist{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.fitem{display:flex;align-items:center;gap:11px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs)}
.fitem-ico{font-size:22px;flex-shrink:0}
.fitem-info{flex:1;min-width:0}
.fitem-nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fitem-meta{font-size:11.5px;color:var(--muted);margin-top:2px}

/* MAP */
#map-cont{height:calc(100vh - var(--hh) - 90px);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.map-filter-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s;font-size:13.5px;user-select:none}
.map-filter-row:hover{background:var(--bg)}
.map-filter-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--grn);cursor:pointer;flex-shrink:0}
.map-filter-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-filter-label{flex:1;font-weight:500;color:var(--text)}
.map-filter-count{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}

/* EMPTY STATE */
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:10px;opacity:.4}
.empty-t{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--text)}
.empty-s{font-size:13.5px}

/* PIPELINE */
.pipe-scroll{overflow-x:auto;padding-bottom:6px}
.pipeline{display:flex;gap:14px;min-width:max-content;padding-bottom:4px}
.pc{width:236px;flex-shrink:0}
.pch{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--rs) var(--rs) 0 0;margin-bottom:-1px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pcb{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--rs) var(--rs);min-height:100px;padding:9px;display:flex;flex-direction:column;gap:7px;transition:background .15s,border-color .15s}
.pcb.drag-over{background:var(--grn-light);border-color:var(--grn);border-style:dashed}
.pcard{background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:12px;cursor:grab;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04);user-select:none}
.pcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);transform:translateY(-1px);border-color:var(--grn-mid)}
.pcard.dragging{opacity:.3;cursor:grabbing;transform:scale(.96)}
.pcard-nm{font-size:12.5px;font-weight:700;margin-bottom:3px}
.pcard-s{font-size:11.5px;color:var(--muted)}
.drop-ghost{height:4px;border-radius:2px;background:var(--grn);margin:2px 0;opacity:0;transition:opacity .1s;pointer-events:none}
.drop-ghost.visible{opacity:1}

/* BACK BTN */
.back{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;margin-bottom:18px;transition:color .15s;padding:6px 10px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border)}
.back:hover{color:var(--grn);border-color:var(--grn)}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* LINE ITEMS */
.li-row{display:grid;grid-template-columns:1fr 60px 70px 90px 70px 90px 90px 32px;gap:6px;margin-bottom:6px;align-items:center}
.li-row input{padding:8px 8px}
.li-cost{background:#FFF8F0 !important;border-color:#FDD9B5 !important}
.li-margin{background:#FFF8F0 !important;border-color:#FDD9B5 !important}
.li-internal-label{font-size:9.5px;font-weight:700;color:#C2410C;text-transform:uppercase;letter-spacing:.4px;text-align:center;margin-top:-2px}

/* TOTALS */
.totals-box{background:var(--grn-light);border-radius:var(--rs);padding:14px 16px;margin-top:12px;border:1px solid var(--grn-mid)}
.totals-grid{display:grid;grid-template-columns:1fr auto;gap:4px 24px;max-width:260px;margin-left:auto;font-size:13.5px}

/* ACTIVITY */
.act-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);margin-top:5px;flex-shrink:0}
.act-txt{font-size:13.5px;line-height:1.5}
.act-time{font-size:11.5px;color:var(--muted);margin-top:2px}

@media(max-width:860px){
  :root{--sw:0px}
  #sidebar{display:none}
  .dl{grid-template-columns:1fr}
  .fg2{grid-template-columns:1fr}
  .fg2 .fw{grid-column:1}
}
/* PAYMENTS */
.pay-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);font-size:13.5px}
.pay-row:last-child{border-bottom:none}
.pay-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11.5px;font-weight:600}
.pay-balance-bar{height:6px;border-radius:3px;background:var(--bg);overflow:hidden;margin-top:5px}
.pay-balance-fill{height:100%;border-radius:3px;background:var(--grn);transition:width .4s ease}

/* CUSTOMER CARDS */
.cust-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:16px}
.cust-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.cust-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.cust-card-img{height:110px;background-size:cover;background-position:center;position:relative}
.cust-card-img-overlay{position:absolute;inset:0;background:linear-gradient(rgba(10,40,20,.55),rgba(10,40,20,.7))}
.cust-card-av{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:1}
.cust-card-body{padding:26px 14px 14px;text-align:center}
.cust-card-name{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-card-meta{font-size:11.5px;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-card-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--border);background:#FAFAFA;font-size:11.5px;color:var(--muted)}

/* PROFILE PHOTO EDIT */
.prof-edit-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:background .15s;font-size:13px}
.prof-edit-btn:hover{background:rgba(0,0,0,.7)}

/* VIEW TOGGLE */
.view-toggle{display:flex;border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.view-toggle-btn{padding:7px 12px;font-size:13px;background:var(--surface);border:none;cursor:pointer;color:var(--muted);font-family:var(--font);transition:all .15s}
.view-toggle-btn.active{background:var(--grn);color:#fff}
.view-toggle-btn:not(:last-child){border-right:1.5px solid var(--border)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--rs);overflow:hidden}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--rs) var(--rs) 0 0;overflow:hidden;margin-bottom:1px}
.cal-dow{padding:9px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:#FAFAFA}
.cal-day{min-height:88px;background:var(--surface);padding:7px 8px;position:relative;vertical-align:top}
.cal-day.other-month{background:#FAFAFA}
.cal-day.today{background:#F0FDF4}
.cal-day-num{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:5px}
.cal-day.other-month .cal-day-num{color:var(--light)}
.cal-day.today .cal-day-num{width:26px;height:26px;background:var(--grn);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;margin-bottom:5px}
.cal-chip{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:opacity .1s;border:none;width:100%;text-align:left;font-family:var(--font)}
.cal-chip:hover{opacity:.8}
.wo-filters{display:flex;gap:8px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid var(--border);background:#FAFAFA}
.wo-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:100px;font-size:12.5px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none}
.wo-pill input[type=checkbox]{display:none}
.wo-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wo-pill.checked{border-color:currentColor}
.wo-pill:not(.checked){opacity:.45;filter:grayscale(.4)}
.wo-pill:hover{opacity:1;filter:none}

/* WO CARDS */
.wo-list{display:flex;flex-direction:column;gap:0}
.wo-row{display:grid;grid-template-columns:36px 1fr 160px 120px 120px 110px 80px;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.wo-row:hover{background:#F9FFF9}
.wo-row:last-child{border-bottom:none}
.wo-num{font-size:11px;font-weight:700;color:var(--light);font-family:monospace}
.wo-bar{display:flex;gap:0;height:5px;border-radius:3px;overflow:hidden;margin-top:5px}
.wo-bar-seg{height:100%;transition:width .3s}

.flex-c{display:flex;align-items:center}
.gap-2{gap:8px}.gap-3{gap:12px}
.fw-bold{font-weight:700}
.t-muted{color:var(--muted);font-size:12.5px}
.t-right{text-align:right}

/* SVG NAV ICONS */
.ni-svg{width:16px;height:16px;flex-shrink:0;color:currentColor}

<script>
// ═══════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════
const SK = 'brushpro_v1';
let DB = { customers: [], estimates: [], workOrders: [], payments: [] };

function loadDB() {
  try { const r = localStorage.getItem(SK); if (r) DB = JSON.parse(r); } catch(e) {}
  if (!DB.customers) DB.customers = [];
  if (!DB.estimates) DB.estimates = [];
  if (!DB.workOrders) DB.workOrders = [];
  if (!DB.payments)   DB.payments   = [];
}
function saveDB() {
  try { localStorage.setItem(SK, JSON.stringify(DB)); }
  catch(e) { alert('Storage is full. Please delete some files to continue.'); }
}
function uid() { return '_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

// CUSTOMERS
const getCustomers = () => DB.customers;
const getCustomer = id => DB.customers.find(c => c.id === id);
function addCustomer(d) {
  const c = { id:uid(), name:d.name||'', email:d.email||'', phone:d.phone||'',
    address:d.address||'', city:d.city||'', state:d.state||'', zip:d.zip||'',
    status:d.status||'new_lead', source:d.source||'', notes:d.notes||'',
    lat:d.lat||null, lng:d.lng||null, files:[], createdAt:Date.now(), updatedAt:Date.now() };
  DB.customers.push(c);
  saveDB();
  if (!c.lat && c.address) geocode(c.id);
  return c;
}
function updateCustomer(id, d) {
  const i = DB.customers.findIndex(c => c.id === id);
  if (i === -1) return;
  const old = DB.customers[i];
  DB.customers[i] = { ...old, ...d, id, updatedAt:Date.now() };
  saveDB();
  if (d.address !== old.address || d.city !== old.city || d.zip !== old.zip) geocode(id);
  return DB.customers[i];
}
function deleteCustomer(id) {
  DB.customers = DB.customers.filter(c => c.id !== id);
  DB.estimates = DB.estimates.filter(e => e.customerId !== id);
  saveDB();
}

// ESTIMATES
const getEstimates = cid => cid ? DB.estimates.filter(e => e.customerId === cid) : DB.estimates;
const getEstimate = id => DB.estimates.find(e => e.id === id);
function addEstimate(d) {
  const e = { id:uid(), customerId:d.customerId, title:d.title||'New Estimate',
    description:d.description||'', lineItems:d.lineItems||[], subtotal:d.subtotal||0,
    taxRate:d.taxRate||0, tax:d.tax||0, total:d.total||0,
    notes:d.notes||'', validUntil:d.validUntil||'', createdAt:Date.now(), updatedAt:Date.now() };
  DB.estimates.push(e);
  saveDB();
  return e;
}
function updateEstimate(id, d) {
  const i = DB.estimates.findIndex(e => e.id === id);
  if (i === -1) return;
  DB.estimates[i] = { ...DB.estimates[i], ...d, id, updatedAt:Date.now() };
  saveDB();
  return DB.estimates[i];
}
function deleteEstimate(id) { DB.estimates = DB.estimates.filter(e => e.id !== id); saveDB(); }

// WORK ORDERS
const getWorkOrders = () => DB.workOrders;
const getWorkOrder = id => DB.workOrders.find(w => w.id === id);
const getWorkOrderByEstimate = eid => DB.workOrders.find(w => w.estimateId === eid);
function addWorkOrder(d) {
  const w = { id:uid(), estimateId:d.estimateId||null, customerId:d.customerId||null,
    title:d.title||'Work Order', woStatus:d.woStatus||'new',
    scheduledDate:d.scheduledDate||'', assignedTo:d.assignedTo||'',
    notes:d.notes||'', total:d.total||0,
    createdAt:Date.now(), updatedAt:Date.now() };
  DB.workOrders.push(w);
  saveDB();
  return w;
}
function updateWorkOrder(id, d) {
  const i = DB.workOrders.findIndex(w => w.id === id);
  if (i === -1) return;
  DB.workOrders[i] = { ...DB.workOrders[i], ...d, id, updatedAt:Date.now() };
  saveDB();
  return DB.workOrders[i];
}
function deleteWorkOrder(id) { DB.workOrders = DB.workOrders.filter(w => w.id !== id); saveDB(); }

// PAYMENTS
const getPayments = cid => cid ? DB.payments.filter(p => p.customerId === cid) : DB.payments;
const getPayment  = id  => DB.payments.find(p => p.id === id);
function addPayment(d) {
  const p = { id:uid(), customerId:d.customerId||null, estimateId:d.estimateId||null,
    amount:d.amount||0, method:d.method||'check', reference:d.reference||'',
    date:d.date||new Date().toISOString().slice(0,10), notes:d.notes||'',
    createdAt:Date.now() };
  DB.payments.push(p);
  saveDB();
  return p;
}
function updatePayment(id, d) {
  const i = DB.payments.findIndex(p => p.id === id);
  if (i === -1) return;
  DB.payments[i] = { ...DB.payments[i], ...d, id };
  saveDB();
  return DB.payments[i];
}
function deletePayment(id) { DB.payments = DB.payments.filter(p => p.id !== id); saveDB(); }

// Helper: total paid for an estimate
const paidForEst  = eid  => DB.payments.filter(p => p.estimateId === eid).reduce((s,p) => s+(p.amount||0), 0);
// Helper: total paid for a customer
const paidForCust = cid  => DB.payments.filter(p => p.customerId === cid).reduce((s,p) => s+(p.amount||0), 0);
// Helper: balance owed for a customer (sum of estimate totals minus payments)
function balanceForCust(cid) {
  const rev = getEstimates(cid).reduce((s,e) => s+(e.total||0), 0);
  return rev - paidForCust(cid);
}

// Auto-create work order when customer is job_won or beyond and estimate has no WO yet
function syncWorkOrder(estimate) {
  const c = getCustomer(estimate.customerId);
  const wonStatuses = ['job_won','job_in_progress','job_complete'];
  if (c && wonStatuses.includes(c.status) && !getWorkOrderByEstimate(estimate.id)) {
    addWorkOrder({
      estimateId: estimate.id, customerId: estimate.customerId,
      title: estimate.title, total: estimate.total,
      woStatus: 'new', notes: estimate.notes || ''
    });
  }
}

// FILES
function addFile(cid, f) {
  const c = getCustomer(cid); if (!c) return;
  if (!c.files) c.files = [];
  c.files.push({ id:uid(), name:f.name, type:f.type, size:f.size, data:f.data, uploadedAt:Date.now() });
  saveDB();
}
function deleteFile(cid, fid) {
  const c = getCustomer(cid); if (!c) return;
  c.files = c.files.filter(f => f.id !== fid); saveDB();
}

// GEOCODING via Nominatim
async function geocode(id) {
  const c = getCustomer(id); if (!c || !c.address) return;
  const q = [c.address, c.city, c.state, c.zip].filter(Boolean).join(', ');
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data = await res.json();
    if (data?.[0]) updateCustomer(id, { lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon) });
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// LABELS & HELPERS
// ═══════════════════════════════════════════════
const CSTAT = { new_lead:'New Lead', contacted:'Contacted', active_estimate:'Active Estimate',
  estimate_sent:'Estimate Sent', job_won:'Job Won', job_in_progress:'Job In Progress',
  job_complete:'Job Complete', job_lost:'Job Lost', inactive:'Inactive' };
const WOSTAT = { new:'New Work Order', upcoming:'Upcoming', in_progress:'In Progress',
  quality_control:'Quality Control', completed:'Completed', closed:'Closed (Paid)' };
const WOSTAT_COLORS = { new:'#3B82F6', upcoming:'#7C3AED', in_progress:'#C2410C',
  quality_control:'#B45309', completed:'#047857', closed:'#15803D' };
const WOSTAT_BG = { new:'#EFF6FF', upcoming:'#F5F3FF', in_progress:'#FFF7ED',
  quality_control:'#FFFBEB', completed:'#ECFDF5', closed:'#F0FDF4' };
const SOURCES = { referral:'Referral', website:'Website', google:'Google', yelp:'Yelp',
  facebook:'Facebook / Social', nextdoor:'Nextdoor', yard_sign:'Yard Sign',
  repeat:'Repeat Customer', other:'Other' };
const MAP_COLORS = { new_lead:'#2563EB', contacted:'#7C3AED', active_estimate:'#C2410C',
  estimate_sent:'#B45309', job_won:'#047857', job_in_progress:'#1D4ED8',
  job_complete:'#15803D', job_lost:'#DC2626', inactive:'#6B7280' };

const $c = (n) => '$' + (+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fdate = ts => ts ? new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
function ago(ts) {
  const m = Math.floor((Date.now()-ts)/60000);
  if (m<1) return 'just now'; if (m<60) return m+'m ago';
  const h = Math.floor(m/60); if (h<24) return h+'h ago';
  const d = Math.floor(h/24); if (d<30) return d+'d ago';
  return fdate(ts);
}
const ini = n => n.split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('');
function ficon(t) {
  if (t?.startsWith('image/')) return '🖼️';
  if (t==='application/pdf') return '📄';
  if (t?.includes('word')) return '📝';
  if (t?.includes('sheet')||t?.includes('excel')) return '📊';
  return '📎';
}
function fsz(b) {
  if (b<1024) return b+' B'; if (b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
const bdg = s => `<span class="badge badge-${s}">${CSTAT[s]||s}</span>`;
const woBdg = s => `<span class="badge badge-wo_${s}">${WOSTAT[s]||s}</span>`;

// Pool of confirmed Pexels house exterior photos (free to use)
const HOUSE_IMGS = [
  8894802,  // Ranch home, winter suburban street
  5071177,  // Suburban home with lawn, Curtis Adams
  4469137,  // Modern family house, Curtis Adams
  12700439, // Green siding house with garage
  8288954,  // Brick two-story suburban for sale
  8504300,  // American suburban with flag

  280229,   // Yellow suburban house
  209315,   // White concrete home
  259593,   // White house blue sky
  1029599,  // Elegant home exterior

  323780,   // Architecture house exterior
  1115804,  // Colonial style home
  2581922,  // Suburban house driveway
  7004453,  // Luxury home exterior
  4116551,  // House front yard
  3536271,  // House exterior sunshine
  1029614,  // Red brick house
  584399,   // New construction home
  276724,   // Modern house exterior
  164558,   // House exterior blue sky
  2980606,  // House with porch
  1438832,  // House exterior landscape
  2119322,  // White house driveway
  1571460,  // Craftsman home exterior
  2474276,  // House front elevation
  1396132,  // House green lawn trees
  2590553,  // Suburban home day
  1029610,  // House exterior warm light
];

function houseImg(customerId) {
  // Deterministic pick based on customer ID so it stays consistent
  let hash = 0;
  for (let i = 0; i < customerId.length; i++) hash = (hash * 31 + customerId.charCodeAt(i)) >>> 0;
  const id = HOUSE_IMGS[hash % HOUSE_IMGS.length];
  return `https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=800&h=300&fit=crop`;
}

// Compute revenue, cost, gross profit for an estimate.
// If a line item has no saved cost, defaults to 40% margin (cost = price * 0.60).
function estProfit(e) {
  if (!e.lineItems?.length) return { rev: e.total||0, cost: (e.total||0)*0.6, gp: (e.total||0)*0.4 };
  let rev = 0, cost = 0;
  e.lineItems.forEach(li => {
    const qty = li.qty || 1;
    const price = li.unitPrice || 0;
    const m = (li.margin != null && li.margin >= 0 && li.margin < 100) ? li.margin : 40;
    const c = (li.cost != null && li.cost > 0) ? li.cost : price * (1 - m / 100);
    rev  += qty * price;
    cost += qty * c;
  });
  return { rev, cost, gp: rev - cost };
}

function vProductionCalendar(year, month) {
  const now = new Date();
  const y = year  != null ? year  : now.getFullYear();
  const m = month != null ? month : now.getMonth();
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const WO_COLORS = { new:'#3B82F6', upcoming:'#7C3AED', in_progress:'#C2410C', quality_control:'#B45309', completed:'#047857', closed:'#15803D' };
  const years = [y-1, y, y+1];

  const WOS = getWorkOrders().filter(w => w.scheduledDate);
  const woMap = {};
  WOS.forEach(w => {
    if (!woMap[w.scheduledDate]) woMap[w.scheduledDate] = [];
    woMap[w.scheduledDate].push(w);
  });

  const firstDay    = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();
  const todayStr    = now.toISOString().slice(0,10);

  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--)
    cells.push({ day: daysInPrev - i, thisMonth: false, date: null });
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(m+1).padStart(2,'0'), dd = String(d).padStart(2,'0');
    cells.push({ day: d, thisMonth: true, date: `${y}-${mm}-${dd}` });
  }
  let next = 1;
  while (cells.length % 7 !== 0) cells.push({ day: next++, thisMonth: false, date: null });

  const prevM = m === 0 ? 11 : m - 1, prevY = m === 0 ? y - 1 : y;
  const nextM = m === 11 ? 0  : m + 1, nextY = m === 11 ? y + 1 : y;

  return `
  <div style="margin-top:28px">
    <div style="margin-bottom:12px">
      <div style="font-size:17px;font-weight:800;margin-bottom:10px">Production Calendar</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="renderCal(${prevY},${prevM})" style="flex-shrink:0">‹ Prev</button>
        <select class="fsel" style="flex:1" onchange="renderCal(${y},parseInt(this.value))">
          ${MONTHS.map((mn,i)=>`<option value="${i}" ${i===m?'selected':''}>${mn}</option>`).join('')}
        </select>
        <select class="fsel" style="flex:1" onchange="renderCal(parseInt(this.value),${m})">
          ${years.map(yr=>`<option value="${yr}" ${yr===y?'selected':''}>${yr}</option>`).join('')}
        </select>
        <button class="btn btn-secondary btn-sm" onclick="renderCal(${nextY},${nextM})" style="flex-shrink:0">Next ›</button>
        <button class="btn btn-ghost btn-sm" onclick="renderCal(${now.getFullYear()},${now.getMonth()})" style="flex-shrink:0">Today</button>
      </div>
    </div>
    <div class="card" style="overflow:hidden">
      <div class="cal-header">${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells.map(cell => {
        const wos = cell.date ? (woMap[cell.date] || []) : [];
        const isToday = cell.date === todayStr;
        return `<div class="cal-day${!cell.thisMonth?' other-month':''}${isToday?' today':''}">
          <div class="cal-day-num">${cell.day}</div>
          ${wos.slice(0,3).map(w => {
            const col = WO_COLORS[w.woStatus] || '#6B7280';
            const c = getCustomer(w.customerId);
            const label = c?.name?.trim().split(' ').pop() || w.title.split(/\s+/)[0];
            return `<button class="cal-chip" style="background:${col}22;color:${col}" onclick="openWODetailModal('${w.id}')">${label}</button>`;
          }).join('')}
          ${wos.length > 3 ? `<div style="font-size:10px;color:var(--muted);padding:1px 5px;font-weight:600">+${wos.length-3} more</div>` : ''}
        </div>`;
      }).join('')}</div>
    </div>
  </div>`;
}

  const el = document.getElementById('prod-cal');

function filterC() {
  const q=(document.getElementById('cs-q')?.value||'').toLowerCase();
  const st=document.getElementById('cs-stat')?.value||'';
  const src=document.getElementById('cs-src')?.value||'';
  const sort=document.getElementById('cs-sort')?.value||'newest';
  let arr = getCustomers().filter(c=>{
    const ms=!q||c.name.toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.city||'').toLowerCase().includes(q);
    return ms&&(!st||c.status===st)&&(!src||c.source===src);
  });
  if(sort==='newest') arr.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sort==='oldest') arr.sort((a,b)=>a.createdAt-b.createdAt);
  else if(sort==='az') arr.sort((a,b)=>a.name.localeCompare(b.name));
  else arr.sort((a,b)=>a.status.localeCompare(b.status));
  document.getElementById('ctbl').innerHTML = _custView==='card' ? custCards(arr) : custTable(arr);
}

let _dragCid = null;

function vPipeline() {
  const CS = getCustomers();
  const stages = [
    {k:'new_lead',c:'#2563EB',bg:'#EFF6FF'},{k:'contacted',c:'#7C3AED',bg:'#F5F3FF'},
    {k:'active_estimate',c:'#C2410C',bg:'#FFF7ED'},{k:'estimate_sent',c:'#B45309',bg:'#FFFBEB'},
    {k:'job_won',c:'#047857',bg:'#ECFDF5'},{k:'job_in_progress',c:'#1D4ED8',bg:'#EFF6FF'},
    {k:'job_complete',c:'#15803D',bg:'#F0FDF4'},{k:'job_lost',c:'#DC2626',bg:'#FEF2F2'}
  ];
  return `<div class="pipe-scroll"><div class="pipeline">${stages.map(s=>{
    const items = CS.filter(c=>c.status===s.k);
    const estVal = items.map(c=>getEstimates(c.id).reduce((sum,e)=>sum+(e.total||0),0));
    return `<div class="pc">
      <div class="pch" style="background:${s.bg};color:${s.c}">
        ${CSTAT[s.k]}
        <span style="background:${s.c};color:#fff;border-radius:12px;padding:1px 7px;font-size:11px" id="pcnt-${s.k}">${items.length}</span>
      </div>
      <div class="pcb" id="pcb-${s.k}"
        ondragover="pipeDragOver(event,'${s.k}')"
        ondragenter="pipeDragEnter(event,'${s.k}')"
        ondragleave="pipeDragLeave(event,'${s.k}')"
        ondrop="pipeDrop(event,'${s.k}')">
        ${items.length===0
          ? `<div class="pipe-empty-hint" style="font-size:12px;color:var(--light);text-align:center;padding:20px 8px;border:2px dashed transparent;border-radius:8px">Drop here</div>`
          : items.map((c,i)=>`
            <div class="pcard"
              draggable="true"
              data-cid="${c.id}"
              ondragstart="pipeDragStart(event,'${c.id}')"
              ondragend="pipeDragEnd(event)"
              onclick="navigate('customer','${c.id}')">
              <div class="pcard-drag-handle" style="font-size:10px;color:var(--light);margin-bottom:4px;letter-spacing:1px">⠿⠿</div>
              <div class="pcard-nm">${c.name}</div>
              <div class="pcard-s">${c.city||c.phone||'No contact info'}</div>
              ${getEstimates(c.id).length>0?`<div style="margin-top:5px;font-size:11px;color:var(--muted)">${getEstimates(c.id).length} est. · ${$c(estVal[i])}</div>`:''}
            </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div></div>
  <div id="pipe-toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--grn);color:#fff;padding:10px 22px;border-radius:100px;font-size:13.5px;font-weight:600;box-shadow:var(--shadowlg);z-index:9999;transition:transform .25s ease,opacity .25s;opacity:0;pointer-events:none"></div>`;
}

function pipeDragStart(ev, cid) {
  _dragCid = cid;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', cid);
  setTimeout(() => { const el = document.querySelector(`[data-cid="${cid}"]`); if(el) el.classList.add('dragging'); }, 0);
}
function pipeDragEnd(ev) {
  _dragCid = null;
  document.querySelectorAll('.pcard').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.pcb').forEach(el => { el.classList.remove('drag-over'); });
}
function pipeDragEnter(ev, status) {
  ev.preventDefault();
  const col = document.getElementById('pcb-' + status);
  if (col) col.classList.add('drag-over');
}
function pipeDragOver(ev, status) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
}
function pipeDragLeave(ev, status) {
  // Only remove if leaving the column itself, not a child
  const col = document.getElementById('pcb-' + status);
  if (col && !col.contains(ev.relatedTarget)) col.classList.remove('drag-over');
}
function pipeDrop(ev, newStatus) {
  ev.preventDefault();
  const cid = ev.dataTransfer.getData('text/plain') || _dragCid;
  const col = document.getElementById('pcb-' + newStatus);
  if (col) col.classList.remove('drag-over');
  if (!cid) return;
  const c = getCustomer(cid);
  if (!c || c.status === newStatus) return;
  const oldStatus = c.status;
  updateCustomer(cid, { status: newStatus });
  if (newStatus === 'job_won' && oldStatus !== 'job_won') syncWOsForCustomer(cid);
  // Re-render pipeline in place (fast, no full re-render)
  renderPipelineInPlace();
  showPipeToast(`${c.name} → ${CSTAT[newStatus]}`);
}

function renderPipelineInPlace() {
  const CS = getCustomers();
  const stages = ['new_lead','contacted','active_estimate','estimate_sent','job_won','job_in_progress','job_complete','job_lost'];
  const stageColors = {new_lead:'#2563EB',contacted:'#7C3AED',active_estimate:'#C2410C',estimate_sent:'#B45309',job_won:'#047857',job_in_progress:'#1D4ED8',job_complete:'#15803D',job_lost:'#DC2626'};
  stages.forEach(sk => {
    const col = document.getElementById('pcb-' + sk);
    const cnt = document.getElementById('pcnt-' + sk);
    if (!col) return;
    const items = CS.filter(c => c.status === sk);
    if (cnt) cnt.textContent = items.length;
    if (items.length === 0) {
      col.innerHTML = `<div class="pipe-empty-hint" style="font-size:12px;color:var(--light);text-align:center;padding:20px 8px;border:2px dashed transparent;border-radius:8px">Drop here</div>`;
    } else {
      col.innerHTML = items.map(c => {
        const ev = getEstimates(c.id).reduce((s,e)=>s+(e.total||0),0);
        return `<div class="pcard" draggable="true" data-cid="${c.id}"
          ondragstart="pipeDragStart(event,'${c.id}')"
          ondragend="pipeDragEnd(event)"
          onclick="navigate('customer','${c.id}')">
          <div class="pcard-drag-handle" style="font-size:10px;color:var(--light);margin-bottom:4px;letter-spacing:1px">⠿⠿</div>
          <div class="pcard-nm">${c.name}</div>
          <div class="pcard-s">${c.city||c.phone||'No contact info'}</div>
          ${getEstimates(c.id).length>0?`<div style="margin-top:5px;font-size:11px;color:var(--muted)">${getEstimates(c.id).length} est. · ${$c(ev)}</div>`:''}
        </div>`;
      }).join('');
    }
  });
}

function showPipeToast(msg) {
  const t = document.getElementById('pipe-toast');
  if (!t) return;
  t.textContent = '✓ ' + msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._to);
  t._to = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(60px)';
  }, 2400);
}

  return `<div>

function vEstimates() {
  return `<div class="card">
    <div style="display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--border);background:#FAFAFA">
      <select class="fsel" style="flex:1" id="es-stat" onchange="filterE()"><option value="">All Customer Statuses</option>${Object.entries(CSTAT).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <select class="fsel" style="flex:1" id="es-sort" onchange="filterE()"><option value="newest">Newest First</option><option value="oldest">Oldest First</option><option value="value_hi">Highest Value</option><option value="value_lo">Lowest Value</option></select>
    </div>
    <div class="fbar">
      <div class="si-wrap"><span class="sic">🔍</span><input type="text" class="search-input" id="es-q" placeholder="Search estimates or customer name..." oninput="filterE()"></div>
    </div>
    <div id="etbl">${estTable(getEstimates())}</div>
  </div>`;
}
function estTable(arr) {
  if (!arr.length) return `<div class="empty"><div class="empty-ico">📄</div><div class="empty-t">No estimates yet</div><div class="empty-s">Add estimates from a customer's profile</div></div>`;
  const sorted = [...arr].sort((a,b)=>b.createdAt-a.createdAt);

  const rows = sorted.map(e => {
    const c = getCustomer(e.customerId);
    const lastName = c ? c.name.trim().split(' ').pop() : '';
    const addrDisplay = c?.address
      ? `${c.address} <span style="color:var(--muted);font-weight:400">(${lastName})</span>`
      : c ? `<span style="color:var(--muted)">${c.name}</span>` : '—';
    const { rev, cost, gp } = estProfit(e);
    const gpPct = rev > 0 ? (gp / rev * 100).toFixed(1) : null;
    const gpColor = gp >= 0 ? 'var(--grn)' : '#DC2626';
    return { e, c, addrDisplay, rev, cost, gp, gpPct, gpColor };
  });

  const totalRev  = rows.reduce((s,r) => s + r.rev, 0);
  const totalCost = rows.reduce((s,r) => s + r.cost, 0);
  const totalGP   = totalRev - totalCost;
  const blended   = totalRev > 0 ? (totalGP / totalRev * 100) : null;
  const anyHasCost = rows.length > 0;

  return `<div class="tbl-wrap"><table>
    <thead><tr><th>Title</th><th>Address</th><th>Status</th><th>Total</th><th>Gross Profit</th><th>Created</th><th></th></tr></thead>
    <tbody>${rows.map(({e,c,addrDisplay,gp,gpPct,gpColor})=>`<tr onclick="navigate('customer','${e.customerId||''}')">
        <td class="tn">${e.title}</td>
        <td><span style="cursor:pointer" onclick="navigate('customer','${c?.id||''}');event.stopPropagation()">${addrDisplay}</span></td>
        <td>${c ? bdg(c.status) : '—'}</td>
        <td style="font-weight:700">${$c(e.total)}</td>
        <td><span style="font-weight:700;color:${gpColor}">${$c(gp)}</span>${gpPct!==null?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${gpPct}%</span>`:''}</td>
        <td>${fdate(e.createdAt)}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-xs" title="Download PDF" onclick="downloadEstPDF('${e.id}');event.stopPropagation()">⬇️</button>
          <button class="btn btn-ghost btn-xs" onclick="openEditEst('${e.id}');event.stopPropagation()">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="delEst('${e.id}');event.stopPropagation()">🗑️</button>
        </div></td>
      </tr>`).join('')}</tbody>
    ${anyHasCost ? `<tfoot><tr>
      <td colspan="3" style="padding:12px 18px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:var(--bg);border-top:2px solid var(--border)">Projected Totals</td>
      <td style="padding:12px 18px;font-weight:800;font-size:14px;background:var(--bg);border-top:2px solid var(--border)">${$c(totalRev)}</td>
      <td style="padding:12px 18px;background:var(--bg);border-top:2px solid var(--border)">
        <span style="font-weight:800;font-size:14px;color:${totalGP>=0?'var(--grn)':'#DC2626'}">${$c(totalGP)}</span>
        ${blended!==null?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${blended.toFixed(1)}%</span>`:''}
      </td>
      <td colspan="2" style="background:var(--bg);border-top:2px solid var(--border)"></td>
    </tr></tfoot>` : ''}
  </table></div>`;
}
function filterE() {
  const q   = (document.getElementById('es-q')?.value||'').toLowerCase();
  const st  = document.getElementById('es-stat')?.value||'';
  const srt = document.getElementById('es-sort')?.value||'newest';
  let arr = getEstimates().filter(e => {
    const c = getCustomer(e.customerId);
    const matchQ  = !q || e.title.toLowerCase().includes(q) || (c && c.name.toLowerCase().includes(q));
    const matchSt = !st || (c && c.status === st);
    return matchQ && matchSt;
  });
  if (srt==='oldest')   arr.sort((a,b)=>a.createdAt-b.createdAt);
  else if (srt==='value_hi') arr.sort((a,b)=>(b.total||0)-(a.total||0));
  else if (srt==='value_lo') arr.sort((a,b)=>(a.total||0)-(b.total||0));
  else arr.sort((a,b)=>b.createdAt-a.createdAt);
  document.getElementById('etbl').innerHTML = estTable(arr);
}

  if (_woFilters.has(k)) {

function saveWO(id) {
  const title = document.getElementById('wf-title').value.trim();
  if (!title) { alert('Job title is required.'); return; }
  const d = {
    title,
    customerId: document.getElementById('wf-cid').value,
    woStatus: document.getElementById('wf-stat').value,
    scheduledDate: document.getElementById('wf-date').value,
    assignedTo: document.getElementById('wf-assign').value.trim(),
    total: parseFloat(document.getElementById('wf-total').value)||0,
    notes: document.getElementById('wf-notes').value.trim()
  };
  if (id) updateWorkOrder(id, d); else addWorkOrder(d);
  // Sync customer status if changing WO status to in_progress or further
  if (['in_progress','quality_control','completed'].includes(d.woStatus)) {
    const w = id ? getWorkOrder(id) : DB.workOrders[DB.workOrders.length-1];
    if (w?.customerId) {
      const c = getCustomer(w.customerId);
      if (c && d.woStatus === 'in_progress' && !['job_in_progress','job_complete'].includes(c.status))
        updateCustomer(c.id, { status:'job_in_progress' });
      if (c && d.woStatus === 'completed' && c.status !== 'job_complete')
        updateCustomer(c.id, { status:'job_complete' });
    }
  }
  closeModal(); render();
}

function delWO(id) { confirmDialog('Delete this work order? This cannot be undone.', () => { deleteWorkOrder(id); render(); }); }

// FINANCE VIEW
// ═══════════════════════════════════════════════
let _finMonth = ''; // '' = all months
let _finYear  = String(new Date().getFullYear());

function vFinance() {
  const now = new Date();
  const curYear = now.getFullYear();
  const years = [];
  for (let y = curYear; y >= curYear - 4; y--) years.push(String(y));
  const months = [
    {v:'',l:'All Months'},{v:'1',l:'January'},{v:'2',l:'February'},{v:'3',l:'March'},
    {v:'4',l:'April'},{v:'5',l:'May'},{v:'6',l:'June'},{v:'7',l:'July'},
    {v:'8',l:'August'},{v:'9',l:'September'},{v:'10',l:'October'},{v:'11',l:'November'},{v:'12',l:'December'}
  ];

  // Classify estimates
  const ACTIVE_CUST_STATUSES = ['job_won','job_in_progress','job_complete','closed'];
  const allEst = getEstimates();

  function matchesPeriod(e) {
    const d = new Date(e.createdAt);
    const yearMatch = String(d.getFullYear()) === _finYear;
    const monthMatch = !_finMonth || String(d.getMonth()+1) === _finMonth;
    return yearMatch && monthMatch;
  }

  const pending = allEst.filter(e => {
    const c = getCustomer(e.customerId);
    const cStatus = c?.status || '';
    return matchesPeriod(e) && !ACTIVE_CUST_STATUSES.includes(cStatus);
  });

  const active = allEst.filter(e => {
    const c = getCustomer(e.customerId);
    const cStatus = c?.status || '';
    return matchesPeriod(e) && ACTIVE_CUST_STATUSES.includes(cStatus);
  });

  // Stat calcs
  function sumGroup(arr) {
    let rev=0, cost=0;
    arr.forEach(e => {
      const p = estProfit(e);
      rev  += p.rev;
      cost += p.cost;
    });
    return { rev, cost, gp: rev-cost };
  }
  const pS = sumGroup(pending), aS = sumGroup(active);
  const totalRev = pS.rev + aS.rev;
  const totalGP  = pS.gp  + aS.gp;
  const blended  = totalRev > 0 ? totalGP/totalRev*100 : null;

  const totalBilledAll = [...pending,...active].reduce((s,e) => s+(e.total||0), 0);

    </div>
    <div class="stat-card">

      <div class="stat-val" style="font-size:26px;letter-spacing:-1px;color:${aS.gp>=0?'var(--grn)':'#DC2626'}">${aS.rev>0&&aS.cost>0?$c(aS.gp):'—'}</div>
      <div class="stat-sub light">${aS.rev>0&&aS.cost>0?(aS.gp/aS.rev*100).toFixed(1)+'% margin':'Add costs for margin'}</div>

function finEstTable(arr) {
  const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (!arr.length) return `<div class="empty" style="padding:32px"><div class="empty-ico">📄</div><div class="empty-t">No estimates</div><div class="empty-s">None match the selected period.</div></div>`;

  const rows = arr.map(e => {
    const c = getCustomer(e.customerId);
    const lastName = c ? c.name.trim().split(' ').pop() : '';
    const addrDisplay = c?.address
      ? `${c.address} <span style="color:var(--muted);font-weight:400">(${lastName})</span>`
      : c ? `<span style="color:var(--muted)">${c.name}</span>` : '—';
    const { rev, cost, gp } = estProfit(e);
    const gpPct = rev > 0 ? (gp/rev*100).toFixed(1) : null;
    return { e, c, addrDisplay, rev, cost, gp, gpPct };
  });

  const totalRev  = rows.reduce((s,r)=>s+r.rev, 0);
  const totalCost = rows.reduce((s,r)=>s+r.cost, 0);
  const totalGP   = totalRev - totalCost;
  const blended   = totalRev > 0 ? (totalGP/totalRev*100) : null;

  return `<div class="tbl-wrap"><table>
    <thead><tr><th>Title</th><th>Address</th><th>Status</th><th>Total</th><th>Gross Profit</th><th>Created</th><th></th></tr></thead>
    <tbody>${rows.map(({e,c,addrDisplay,gp,gpPct})=>`<tr onclick="navigate('customer','${e.customerId||''}')">
      <td class="tn">${e.title}</td>
      <td><span style="cursor:pointer" onclick="navigate('customer','${c?.id||''}');event.stopPropagation()">${addrDisplay}</span></td>
      <td>${c ? bdg(c.status) : '—'}</td>
      <td style="font-weight:700">${$c(e.total)}</td>
      <td>
        <span style="font-weight:700;color:${gp>=0?'var(--grn)':'#DC2626'}">${$c(gp)}</span>
        ${gpPct!==null?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${gpPct}%</span>`:''}
      </td>
      <td>${fdate(e.createdAt)}</td>
      <td><div style="display:flex;gap:4px" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-xs" title="Download PDF" onclick="downloadEstPDF('${e.id}')">⬇️</button>
        <button class="btn btn-ghost btn-xs" onclick="openEditEst('${e.id}')">✏️</button>
      </div></td>
    </tr>`).join('')}</tbody>
    <tfoot><tr>
      <td colspan="3" style="padding:12px 18px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:var(--bg);border-top:2px solid var(--border)">${rows.length} estimate${rows.length!==1?'s':''} · Period Total</td>
      <td style="padding:12px 18px;font-weight:800;font-size:14px;background:var(--bg);border-top:2px solid var(--border)">${$c(totalRev)}</td>
      <td style="padding:12px 18px;background:var(--bg);border-top:2px solid var(--border)">
        <span style="font-weight:800;font-size:14px;color:${totalGP>=0?'var(--grn)':'#DC2626'}">${$c(totalGP)}</span>
        ${blended!==null?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${blended.toFixed(1)}%</span>`:''}
      </td>
      <td colspan="2" style="background:var(--bg);border-top:2px solid var(--border)"></td>
    </tr></tfoot>
  </table></div>`;
}

let mapMarkers = {}; // keyed by status → array of L.marker

function vMap() {
  const total = getCustomers().length;

      </div>

        <div style="font-size:11.5px;color:var(--muted);text-align:center">${geo} of ${total} customers on map</div>
      </div>
    </div>

    <!-- MAP -->
    <div id="map-cont" style="height:100%;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)"></div>

  </div>`;

function initMap() {
  if (mapInst) { mapInst.remove(); mapInst = null; }
  mapMarkers = {};
  const el = document.getElementById('map-cont');
  if (!el) return;

  mapInst = L.map('map-cont').setView([39.8, -98.5], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(mapInst);

  const pts = getCustomers().filter(c => c.lat && c.lng);
  const bounds = [];

  pts.forEach(c => {
    const col = MAP_COLORS[c.status] || '#6B7280';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:32px;height:32px;border-radius:50%;background:${col};border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;cursor:pointer;transition:transform .15s">${ini(c.name)}</div>`,
      iconSize: [32, 32], iconAnchor: [16, 16]
    });
    const ES = getEstimates(c.id), tv = ES.reduce((s,e) => s+(e.total||0), 0);
    const marker = L.marker([c.lat, c.lng], {icon}).bindPopup(`
      <div style="font-family:sans-serif;min-width:200px;padding:4px">
        <div style="font-weight:800;font-size:14px;margin-bottom:5px">${c.name}</div>
        <div style="font-size:12.5px;color:#555;margin-bottom:4px">${c.address||''}<br>${[c.city,c.state,c.zip].filter(Boolean).join(', ')}</div>
        ${c.phone?`<div style="font-size:12.5px;margin-bottom:6px">📞 ${c.phone}</div>`:''}
        <div style="display:inline-block;padding:2px 9px;border-radius:10px;background:${col}22;color:${col};font-size:11.5px;font-weight:700;margin-bottom:8px">${CSTAT[c.status]}</div>
        <div style="font-size:12px;color:#888;margin-bottom:8px">${ES.length} estimate(s) · ${$c(tv)}</div>
        <button onclick="navigate('customer','${c.id}')" style="margin-top:2px;background:var(--grn,#1A5C38);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;width:100%">View Profile →</button>
      </div>`);
    marker.addTo(mapInst);
    if (!mapMarkers[c.status]) mapMarkers[c.status] = [];
    mapMarkers[c.status].push(marker);
    bounds.push([c.lat, c.lng]);
  });

  if (bounds.length) mapInst.fitBounds(bounds, {padding:[40,40]});
}

function applyMapFilter() {
  document.querySelectorAll('[data-status]').forEach(cb => {
    const status = cb.dataset.status;
    const markers = mapMarkers[status] || [];
    markers.forEach(m => {
      if (cb.checked) { if (!mapInst.hasLayer(m)) m.addTo(mapInst); }
      else            { if (mapInst.hasLayer(m))  mapInst.removeLayer(m); }
    });
  });
}

function mapSelectAll(checked) {
  document.querySelectorAll('[data-status]').forEach(cb => { cb.checked = checked; });
  applyMapFilter();
}

function saveCust(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const d = { name, phone:document.getElementById('f-phone').value.trim(),
    email:document.getElementById('f-email').value.trim(), address:document.getElementById('f-addr').value.trim(),
    city:document.getElementById('f-city').value.trim(), state:document.getElementById('f-state').value.trim(),
    zip:document.getElementById('f-zip').value.trim(), status:document.getElementById('f-stat').value,
    source:document.getElementById('f-src').value, notes:document.getElementById('f-notes').value.trim() };
  const old = id ? getCustomer(id) : null;
  if (id) updateCustomer(id, d); else { const c = addCustomer(d); id = c.id; }
  // Auto-create WOs if status changed to job_won
  if (d.status === 'job_won' && old?.status !== 'job_won') syncWOsForCustomer(id);
  closeModal(); render();
}

function liRow(li, i) {
  const margin = li.margin != null ? li.margin : 40;
  // If no cost saved yet but unitPrice exists, back-calculate cost from the default margin
  const hasCost = li.cost != null && li.cost > 0;
  const cost = hasCost ? li.cost : (li.unitPrice > 0 ? li.unitPrice * (1 - margin / 100) : '');
  // Price will be recomputed by calcTotals on load, so just seed it from unitPrice
  const price = li.unitPrice || '';
  return `<div class="li-row" id="li-${i}">
    <input type="text" placeholder="e.g. Prep & paint master bedroom" value="${li.description||''}" oninput="calcTotals()" class="li-d">
    <input type="number" value="${li.qty||1}" min="0" step="0.01" style="text-align:center" oninput="calcTotals()" class="li-q">
    <input type="text" value="${li.unit||''}" placeholder="sq ft" style="text-align:center" class="li-u">
    <input type="number" value="${cost !== '' ? Number(cost).toFixed(2) : ''}" placeholder="0.00" min="0" step="0.01" style="text-align:right" oninput="calcPriceFromMargin(${i});calcTotals()" class="li-cost">
    <input type="number" value="${margin}" placeholder="%" min="0" max="100" step="0.1" style="text-align:center" oninput="calcPriceFromMargin(${i});calcTotals()" class="li-margin">
    <input type="number" value="${price}" placeholder="0.00" min="0" step="0.01" style="text-align:right" oninput="calcTotals()" class="li-p">
    <input type="number" value="${li.total||''}" readonly style="text-align:right;background:var(--bg);cursor:default" class="li-t">
    <button onclick="removeLI(${i})" style="border:none;background:var(--bg);cursor:pointer;font-size:14px;color:var(--muted);border-radius:6px;height:36px;display:flex;align-items:center;justify-content:center;padding:0 8px;width:32px">✕</button>
  </div>`;
}

function calcPriceFromMargin(i) {
  const row = document.getElementById('li-' + i);
  if (!row) return;
  const cost   = parseFloat(row.querySelector('.li-cost')?.value) || 0;
  const margin = parseFloat(row.querySelector('.li-margin')?.value);
  if (!isNaN(margin) && margin >= 0 && margin < 100 && cost > 0) {
    const price = cost / (1 - margin / 100);
    const priceInput = row.querySelector('.li-p');
    if (priceInput) priceInput.value = price.toFixed(2);
  }
}

function totalsHTML() {
  const rows = document.querySelectorAll('.li-row');
  let sub = 0, totalCost = 0;
  rows.forEach(r => {
    const q    = parseFloat(r.querySelector('.li-q')?.value)||0;
    const p    = parseFloat(r.querySelector('.li-p')?.value)||0;
    const cost = parseFloat(r.querySelector('.li-cost')?.value)||0;
    sub += q * p;
    totalCost += q * cost;
  });
  const tr = parseFloat(document.getElementById('ef-tax')?.value)||0;
  const tax = sub*(tr/100), total = sub+tax;
  const profit = sub - totalCost;
  const blendedMargin = sub > 0 ? (profit / sub * 100) : 0;
  return `
    <span style="color:var(--muted)">Subtotal</span><span style="font-weight:600;text-align:right">${$c(sub)}</span>
    <span style="color:var(--muted)">Tax (${tr}%)</span><span style="font-weight:600;text-align:right">${$c(tax)}</span>
    <span style="font-weight:800;font-size:15px">Total</span><span style="font-weight:800;font-size:15px;color:var(--grn);text-align:right">${$c(total)}</span>
    ${totalCost>0?`<span style="color:#C2410C;font-size:11px;margin-top:6px;padding-top:6px;border-top:1px dashed #FDD9B5">🔒 Total Cost</span><span style="font-weight:600;text-align:right;color:#C2410C;font-size:11px;margin-top:6px;padding-top:6px;border-top:1px dashed #FDD9B5">${$c(totalCost)}</span>
    <span style="color:#C2410C;font-size:11px">🔒 Gross Profit</span><span style="font-weight:700;text-align:right;color:#C2410C;font-size:11px">${$c(profit)} (${blendedMargin.toFixed(1)}%)</span>`:''}`;
}

function calcTotals() {
  // First: apply margin → price for every row with a cost value
  document.querySelectorAll('.li-row').forEach(r => {
    const cost   = parseFloat(r.querySelector('.li-cost')?.value) || 0;
    const margin = parseFloat(r.querySelector('.li-margin')?.value);
    if (cost > 0 && !isNaN(margin) && margin >= 0 && margin < 100) {
      const priceInput = r.querySelector('.li-p');
      if (priceInput) priceInput.value = (cost / (1 - margin / 100)).toFixed(2);
    }
  });
  // Second: compute qty × price → row total
  document.querySelectorAll('.li-row').forEach(r => {
    const q = parseFloat(r.querySelector('.li-q')?.value) || 0;
    const p = parseFloat(r.querySelector('.li-p')?.value) || 0;
    const t = r.querySelector('.li-t');
    if (t) t.value = (q * p).toFixed(2);
  });
  const el = document.getElementById('ttls');
  if (el) el.innerHTML = totalsHTML();
}

function addLI() {
  const el=document.getElementById('li-cont');
  const i=_liCount++;
  const d=document.createElement('div');
  d.innerHTML=liRow({description:'',qty:1,unit:'',cost:0,margin:40,unitPrice:0,total:0},i);
  el.appendChild(d.firstElementChild);
  calcTotals();
}
function removeLI(i) { const el=document.getElementById('li-'+i); if(el){el.remove();calcTotals();} }

function saveEst(id) {
  const cid = document.getElementById('ef-cid').value;
  const title = document.getElementById('ef-title').value.trim();
  if (!cid) { alert('Please select a customer.'); return; }
  if (!title) { alert('Estimate title is required.'); return; }
  const rows = document.querySelectorAll('.li-row');
  const LI=[]; let sub=0;
  rows.forEach(r=>{
    const desc=r.querySelector('.li-d')?.value||'';
    const qty=parseFloat(r.querySelector('.li-q')?.value)||0;
    const unit=r.querySelector('.li-u')?.value||'';
    const cost=parseFloat(r.querySelector('.li-cost')?.value)||0;
    const margin=parseFloat(r.querySelector('.li-margin')?.value)||0;
    const up=parseFloat(r.querySelector('.li-p')?.value)||0;
    const tot=qty*up; sub+=tot;
    if(desc||qty>0) LI.push({description:desc,qty,unit,cost,margin,unitPrice:up,total:tot});
  });
  const tr=parseFloat(document.getElementById('ef-tax')?.value)||0;
  const tax=sub*(tr/100);
  const d={customerId:cid,title,description:document.getElementById('ef-desc').value.trim(),
    validUntil:document.getElementById('ef-valid').value,
    notes:document.getElementById('ef-notes').value.trim(),lineItems:LI,subtotal:sub,taxRate:tr,tax,total:sub+tax};
  if(id) updateEstimate(id,d); else addEstimate(d);
  // Sync work order if customer is already job_won
  const saved = id ? getEstimate(id) : DB.estimates[DB.estimates.length-1];
  if (saved) syncWorkOrder(saved);
  closeModal(); render();
}

// PDF GENERATION
// ═══════════════════════════════════════════════
function downloadEstPDF(estId) {
  const e = getEstimate(estId);
  if (!e) return;
  const c = getCustomer(e.customerId);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'letter' });

  const PW = 612, PH = 792;
  const ML = 48, MR = 48, MT = 48;
  const CW = PW - ML - MR; // 516
  const GRN  = [26, 92, 56];
  const DARK = [17, 24, 39];
  const MID  = [75, 85, 99];
  const LT   = [156, 163, 175];
  const BORD = [229, 231, 235];
  const GNLT = [232, 245, 238];

  let y = MT;

  // ── Header bar ──────────────────────────────
  doc.setFillColor(...GRN);
  doc.rect(0, 0, PW, 80, 'F');

  // Company name
  doc.setFont('helvetica','bold');
  doc.setFontSize(22);
  doc.setTextColor(255,255,255);
  doc.text('BrushPro Painting', ML, 34);

  // Tagline
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(200,230,212);
  doc.text('Professional Painting Services', ML, 50);

  // "ESTIMATE" label top right
  doc.setFont('helvetica','bold');
  doc.setFontSize(26);
  doc.setTextColor(255,255,255);
  doc.text('ESTIMATE', PW - MR, 38, { align:'right' });

  // Est number + date top right below
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(200,230,212);
  const estNum = `#${estId.slice(-6).toUpperCase()}`;
  doc.text(`No. ${estNum}`, PW - MR, 52, { align:'right' });
  doc.text(`Date: ${new Date(e.createdAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`, PW - MR, 64, { align:'right' });

  y = 100;

  // ── Bill To / Estimate Details ───────────────
  const col2X = ML + CW / 2 + 10;

  // Bill To block
  doc.setFont('helvetica','bold');
  doc.setFontSize(8.5);
  doc.setTextColor(...LT);
  doc.text('BILL TO', ML, y);
  doc.setTextColor(...DARK);
  doc.setFontSize(12);
  doc.setFont('helvetica','bold');
  doc.text(c?.name || 'Customer', ML, y + 15);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(...MID);
  let addrY = y + 29;
  if (c?.address) { doc.text(c.address, ML, addrY); addrY += 13; }
  const cityLine = [c?.city, c?.state, c?.zip].filter(Boolean).join(', ');
  if (cityLine) { doc.text(cityLine, ML, addrY); addrY += 13; }
  if (c?.phone) { doc.text(c.phone, ML, addrY); addrY += 13; }
  if (c?.email) { doc.text(c.email, ML, addrY); }

  // Estimate details block (right side)
  const detailsData = [
    ['Estimate No.', estNum],
    ['Date', new Date(e.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})],
    ['Valid Until', e.validUntil || '30 days from issue'],
    ['Status', c ? (CSTAT[c.status] || c.status) : 'N/A'],
  ];
  let dY = y;
  detailsData.forEach(([label, val]) => {
    doc.setFont('helvetica','bold');
    doc.setFontSize(8.5);
    doc.setTextColor(...LT);
    doc.text(label.toUpperCase(), col2X, dY);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...DARK);
    doc.text(String(val), col2X, dY + 13);
    dY += 30;
  });

  y = Math.max(addrY, dY) + 20;

  // ── Job title / description ──────────────────
  doc.setFillColor(...GNLT);
  doc.roundedRect(ML, y, CW, e.description ? 46 : 30, 4, 4, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(...GRN);
  doc.text(e.title, ML + 12, y + 18);
  if (e.description) {
    doc.setFont('helvetica','normal');
    doc.setFontSize(9.5);
    doc.setTextColor(...MID);
    doc.text(e.description, ML + 12, y + 34);
  }
  y += (e.description ? 46 : 30) + 16;

  // ── Line items table ─────────────────────────
  const hasItems = e.lineItems && e.lineItems.length > 0;
  if (hasItems) {
    const tableBody = e.lineItems.map(li => [
      li.description || '',
      `${li.qty || 1}${li.unit ? ' ' + li.unit : ''}`,
      `$${(+li.unitPrice||0).toFixed(2)}`,
      `$${(+li.total||0).toFixed(2)}`
    ]); // cost & margin intentionally excluded from PDF

    doc.autoTable({
      startY: y,
      head: [['Description', 'Qty / Unit', 'Unit Price', 'Amount']],
      body: tableBody,
      margin: { left: ML, right: MR },
      styles: { font:'helvetica', fontSize:10, textColor:DARK, cellPadding:{top:9,bottom:9,left:10,right:10}, lineColor:BORD, lineWidth:0.5 },
      headStyles: { fillColor:DARK, textColor:[255,255,255], fontStyle:'bold', fontSize:9, halign:'left' },
      columnStyles: {
        0: { cellWidth: 230 },
        1: { cellWidth: 90, halign:'center' },
        2: { cellWidth: 96, halign:'right' },
        3: { cellWidth: 100, halign:'right', fontStyle:'bold' }
      },
      alternateRowStyles: { fillColor:[249,250,251] },
      tableLineColor: BORD,
      tableLineWidth: 0.5,
    });
    y = doc.lastAutoTable.finalY + 16;
  }

  // ── Totals box ───────────────────────────────
  const tbW = 220, tbX = PW - MR - tbW;
  const rows = [
    ['Subtotal', $c(e.subtotal)],
    ...(e.taxRate > 0 ? [[`Tax (${e.taxRate}%)`, $c(e.tax)]] : []),
  ];
  const rowH = 22;
  const totH = rows.length * rowH + 36;

  doc.setDrawColor(...BORD);
  doc.setLineWidth(0.5);
  doc.setFillColor(249,250,251);
  doc.roundedRect(tbX, y, tbW, totH, 4, 4, 'FD');

  let tY = y + 16;
  rows.forEach(([label, val]) => {
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...MID);
    doc.text(label, tbX + 14, tY);
    doc.text(val, tbX + tbW - 14, tY, { align:'right' });
    tY += rowH;
  });

  // Total divider
  doc.setDrawColor(...BORD);
  doc.setLineWidth(0.5);
  doc.line(tbX + 10, tY - 6, tbX + tbW - 10, tY - 6);

  // Total row
  doc.setFillColor(...GRN);
  doc.roundedRect(tbX, tY - 4, tbW, 28, 0, 0, 'F');
  doc.roundedRect(tbX, tY - 4, tbW, 28, 4, 4, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(255,255,255);
  doc.text('TOTAL', tbX + 14, tY + 13);
  doc.text($c(e.total), tbX + tbW - 14, tY + 13, { align:'right' });

  y += totH + 24;

  // ── Notes ────────────────────────────────────
  if (e.notes && e.notes.trim()) {
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(...LT);
    doc.text('NOTES', ML, y);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...MID);
    const wrapped = doc.splitTextToSize(e.notes, CW);
    doc.text(wrapped, ML, y + 14);
    y += 14 + wrapped.length * 13 + 16;
  }

  // ── Terms & acceptance ───────────────────────
  const terms = 'This estimate is valid for 30 days from the issue date unless otherwise noted. A 50% deposit is required to schedule the job. Remaining balance is due upon project completion. Prices may be subject to change if the scope of work changes.';
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(...LT);
  doc.text('TERMS & CONDITIONS', ML, y);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...LT);
  const termsWrapped = doc.splitTextToSize(terms, CW);
  doc.text(termsWrapped, ML, y + 12);
  y += 12 + termsWrapped.length * 11 + 28;

  // Acceptance signatures
  if (y + 80 > PH - 60) { doc.addPage(); y = MT; }
  doc.setDrawColor(...BORD);
  doc.setLineWidth(0.5);
  const sigW = (CW - 40) / 2;
  doc.line(ML, y + 30, ML + sigW, y + 30);
  doc.line(ML + sigW + 40, y + 30, ML + CW, y + 30);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8.5);
  doc.setTextColor(...LT);
  doc.text('Customer Signature & Date', ML, y + 42);
  doc.text('Authorized by BrushPro', ML + sigW + 40, y + 42);
  y += 60;

  // ── Footer ───────────────────────────────────
  doc.setFillColor(...GRN);
  doc.rect(0, PH - 36, PW, 36, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(8.5);
  doc.setTextColor(200, 230, 212);
  doc.text('BrushPro Painting  ·  Thank you for your business!', PW / 2, PH - 15, { align:'center' });

  // ── File name ────────────────────────────────
  const addrPart = (c?.address || c?.name || 'Estimate').replace(/[^a-zA-Z0-9\s]/g,'').trim().split(/\s+/).slice(0,4).join('-');
  const fileName = `Estimate - ${addrPart}.pdf`;
  doc.save(fileName);
}

function syncWOsForCustomer(cid) {
  // When a customer is marked job_won, create WOs for all their estimates that don't have one yet
  const estimates = getEstimates(cid);
  estimates.forEach(e => {
    if (!getWorkOrderByEstimate(e.id)) {
      addWorkOrder({ estimateId:e.id, customerId:cid, title:e.title, total:e.total, woStatus:'new', notes:e.notes||'' });
    }
  });
  // If no estimates exist, create a blank WO from the customer record
  const c = getCustomer(cid);
  const hasAnyWO = getWorkOrders().some(w => w.customerId === cid);
  if (!hasAnyWO && c) {
    addWorkOrder({ customerId:cid, title:`Job — ${c.name}`, total:0, woStatus:'new' });
  }
}

function quickStat(id, v) {
  const old = getCustomer(id);
  updateCustomer(id, { status:v });
  if (v === 'job_won' && old?.status !== 'job_won') syncWOsForCustomer(id);
  render();
}

function delCust(id) {
  const c=getCustomer(id); if(!c) return;

}

function delFileConfirm(cid,fid) { confirmDialog('Delete this file? This cannot be undone.', () => { deleteFile(cid,fid); render(); }); }
function dlFile(cid,fid) {
  const c=getCustomer(cid); if(!c) return;
  const f=c.files.find(f=>f.id===fid); if(!f) return;
  const a=document.createElement('a'); a.href=f.data; a.download=f.name; a.click();
}
function handleInput(ev,cid) { processFiles(cid, ev.target.files); }
function handleDrop(ev,cid) { ev.preventDefault(); ev.currentTarget.classList.remove('dragover'); processFiles(cid,ev.dataTransfer.files); }
function processFiles(cid,files) {
  Array.from(files).forEach(file=>{
    if(file.size>5*1024*1024){ alert(`"${file.name}" exceeds the 5 MB limit.`); return; }
    const r=new FileReader(); r.onload=e=>{addFile(cid,{name:file.name,type:file.type,size:file.size,data:e.target.result});render();};
    r.readAsDataURL(file);
  });
}
function uploadProfilePhoto(ev, cid) {
  const file = ev.target.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { alert('Image must be under 5 MB.'); return; }
  const r = new FileReader();
  r.onload = e => {
    updateCustomer(cid, { profilePhoto: e.target.result });
    // Update the background image in place without full re-render
    const hd = document.querySelector('.prof-hd');
    if (hd) hd.style.backgroundImage = `url('${e.target.result}')`;
  };

// EXPORT
// ═══════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brushpro-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
